<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </link>
    <script src="https://kit.fontawesome.com/d3c42d7fff.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="stylesheet.css">
    <script src="script.js" defer></script>
    <title>Login</title>
</head>
<body>
    <section class="vh-100 login_container">

      <!-- Left side -->
      <div class="login-left" >
        <img src="./img/library_left_side.png" alt="">
      </div>


      <div class="login-right">
        <div class="log_card">
          <div class="log_title">Staff Portal</div>
          <div class="log_title_line"></div>
          <p class="log_text">Enter your credentials to access the administrative dashboard.</p>

          <div class="log_btns">
            <button class="btn btn-secondary w-100 " id="LoginBtn">Login</button>
            <button class="btn btn-secondary w-100 " id="RegisterBtn">Register</button>
          </div>

          <form action="login.php" method="post" class="login_form">
            <div class="mb-3">
              <label for="username" class="form-label">Username</label>
              <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </div>

        

      </div>

    </section>



  <!-- bootstrap-scrip -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous">
  </script>
</body>
</html>
