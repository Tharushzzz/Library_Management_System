<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </link>
  <script src="https://kit.fontawesome.com/d3c42d7fff.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="stylesheet.css">
  <script src="script.js" defer></script>

  <title>Library Management System</title>
</head>

<body>

  


  <!-- Nav bar -->
  <div id="menu" class="d-flex align-items-start nav-container">

    <!-- mobile view btn -->
    <button id="menu_btn" class="btn btn-primary d-md-none menu_mobile_btn" >
      <i class="fas fa-bars" style="color: rgb(230, 232, 232);"></i>
    </button>


    <div class="nav flex-column gap-2 nav-pills me-3 menu_bg_color menu" id="navbar" role="tablist" aria-orientation="vertical">

    <button id="menu-close" class="btn d-md-none menu_close_btn" >
      <i class="fa-solid fa-xmark" style="color: rgb(255, 255, 255);"></i>
    </button>

      <!-- title -->
      <h3 class="menu_title">Library <br> Management</h3>
      <div class="menu_title_line"></div>

      <!-- menu-items -->
      <button class="nav-link active mt-4 d-flex gap-2 align-items-center menu_btn" id="v-pills-staff-tab" data-bs-toggle="pill" data-bs-target="#v-pills-staff"
        type="button" role="tab" aria-controls="v-pills-staff" aria-selected="true">
        <i class="fa-regular fa-user" style="color: rgb(160, 164, 165);"></i>
        Staff Users
      </button>

      <!-- need to add mt wehen staff user hide -->
      <button class="nav-link d-flex gap-2 align-items-center menu_btn" id="v-pills-user-tab" data-bs-toggle="pill" data-bs-target="#v-pills-user"
        type="button" role="tab" aria-controls="v-pills-user" aria-selected="false">
        <i class="fa-regular fa-user" style="color: rgb(160, 164, 165);"></i>
        User Profile
      </button>
      

      <button class="nav-link d-flex gap-2 align-items-center menu_btn" id="v-pills-books-tab" data-bs-toggle="pill" data-bs-target="#v-pills-books"
        type="button" role="tab" aria-controls="v-pills-books" aria-selected="false">
        <i class="fa-solid fa-book-open" style="color: rgb(160, 164, 165);"></i>
        Books
      </button>


      <button class="nav-link d-flex gap-2 align-items-center menu_btn" id="v-pills-categories-tab" data-bs-toggle="pill" data-bs-target="#v-pills-categories"
        type="button" role="tab" aria-controls="v-pills-categories" aria-selected="false">
        <i class="fa-solid fa-table-cells-large" style="color: rgb(160, 164, 165);"></i>
        Categories
      </button>


      <button class="nav-link d-flex gap-2 align-items-center menu_btn" id="v-pills-Members-tab" data-bs-toggle="pill" data-bs-target="#v-pills-Members"
        type="button" role="tab" aria-controls="v-pills-Members" aria-selected="false">
        <i class="fa-solid fa-user-group" style="color: rgb(160, 164, 165);"></i>
        Members
      </button>


      <button class="nav-link d-flex gap-2 align-items-center menu_btn" id="v-pills-borrow-tab" data-bs-toggle="pill" data-bs-target="#v-pills-borrow"
        type="button" role="tab" aria-controls="v-pills-borrow" aria-selected="false">
        <i class="fa-solid fa-bookmark" style="color: rgb(160, 164, 165);"></i>
        Borrow Details
      </button>

      <button class="nav-link d-flex gap-2 align-items-center menu_btn" id="v-pills-fine-tab" data-bs-toggle="pill" data-bs-target="#v-pills-fine"
        type="button" role="tab" aria-controls="v-pills-fine" aria-selected="false">
        <i class="fa-solid fa-magnifying-glass" style="color: rgb(160, 164, 165);"></i>
        Fine Users
      </button>


      <p class="welcome">Welcome,<spam>User</spam></p>
      <!-- Logout-btn -->
      <button type="button" class="btn btn-danger logout_btn">
        <i class="fa-solid fa-arrow-right-from-bracket" style="color: rgb(255, 255, 255);"></i>
        Logout
      </button>

    </div>


    <!-- menu-tabs -->
    <div class="tab-content" id="v-pills-tabContent">

      <!-- Staff-Users-tab -->
      <div class="tab-pane fade show active" id="v-pills-staff" role="tabpanel" aria-labelledby="v-pills-staff-tab"
        tabindex="0">staff Users this show admin only
      </div>

      <!-- User-profile-tab -->
      <div class="tab-pane fade show active" id="v-pills-user" role="tabpanel" aria-labelledby="v-pills-user-tab"
        tabindex="0">user profile 
      </div>

      <!-- Books-tab -->
      <div class="tab-pane fade" id="v-pills-books" role="tabpanel" aria-labelledby="v-pills-books-tab"
        tabindex="0">
        books
      </div>

      <!-- categories-tab  -->
      <div class="tab-pane fade" id="v-pills-categories" role="tabpanel" aria-labelledby="v-pills-categories-tab"
        tabindex="0">
        categories
      </div>

      <!-- Members-tab  -->
      <div class="tab-pane fade" id="v-pills-Members" role="tabpanel" aria-labelledby="v-pills-Members-tab"
        tabindex="0">
        Members
      </div>
      
      <!-- Borrow-Books-tab -->
      <div class="tab-pane fade" id="v-pills-borrow" role="tabpanel" aria-labelledby="v-pills-borrow-tab"
        tabindex="0">
        Borrow Books
      </div>

      <!-- Fine-Users-tab -->
      <div class="tab-pane fade" id="v-pills-fine" role="tabpanel" aria-labelledby="v-pills-fine-tab"
        tabindex="0">
        Fine
      </div>

    </div>
  </div>


  <!-- bootstrap-scrip -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous">
  </script>

</body>

</html>
