<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </link>
  <script src="https://kit.fontawesome.com/d3c42d7fff.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="stylesheet.css">
  <title>Library Management System</title>
</head>

<body>
  <div class="d-flex align-items-start">
    <div class="nav flex-column gap-2 nav-pills me-3 menu_bg_color menu" id="v-pills-tab" role="tablist" aria-orientation="vertical">
      <h3 class="menu_title">Library <br> Management</h3>
      <div class="menu_title_line"></div>
      <button class="nav-link active mt-4 d-flex gap-2 align-items-center justify-content-center menu_btn" id="v-pills-staff-tab" data-bs-toggle="pill" data-bs-target="#v-pills-staff"
        type="button" role="tab" aria-controls="v-pills-staff" aria-selected="true">
        <i class="fa-regular fa-user" style="color: rgb(160, 164, 165);"></i>
        Staff Users
      </button>

      <button class="nav-link d-flex gap-2 align-items-center justify-content-center menu_btn" id="v-pills-profile-tab" data-bs-toggle="pill" data-bs-target="#v-pills-profile"
        type="button" role="tab" aria-controls="v-pills-profile" aria-selected="false">Profile</button>
      <button class="nav-link d-flex gap-2 align-items-center justify-content-center menu_btn" id="v-pills-disabled-tab" data-bs-toggle="pill" data-bs-target="#v-pills-disabled"
        type="button" role="tab" aria-controls="v-pills-disabled" aria-selected="false" disabled>Disabled</button>
      <button class="nav-link d-flex gap-2 align-items-center justify-content-center menu_btn" id="v-pills-messages-tab" data-bs-toggle="pill" data-bs-target="#v-pills-messages"
        type="button" role="tab" aria-controls="v-pills-messages" aria-selected="false">Messages</button>
      <button class="nav-link d-flex gap-2 align-items-center justify-content-center menu_btn" id="v-pills-settings-tab" data-bs-toggle="pill" data-bs-target="#v-pills-settings"
        type="button" role="tab" aria-controls="v-pills-settings" aria-selected="false">Settings</button>
    </div>
    <div class="tab-content" id="v-pills-tabContent">
      <div class="tab-pane fade show active" id="v-pills-staff" role="tabpanel" aria-labelledby="v-pills-staff-tab"
        tabindex="0">...</div>
      <div class="tab-pane fade" id="v-pills-profile" role="tabpanel" aria-labelledby="v-pills-profile-tab"
        tabindex="0">...</div>
      <div class="tab-pane fade" id="v-pills-disabled" role="tabpanel" aria-labelledby="v-pills-disabled-tab"
        tabindex="0">...</div>
      <div class="tab-pane fade" id="v-pills-messages" role="tabpanel" aria-labelledby="v-pills-messages-tab"
        tabindex="0">...</div>
      <div class="tab-pane fade" id="v-pills-settings" role="tabpanel" aria-labelledby="v-pills-settings-tab"
        tabindex="0">...</div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>
</body>

</html>
